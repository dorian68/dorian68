<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dorian Labry hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#0F4C5C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#F5D56A"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="grain" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#FFFFFF" opacity="0.04"/>
      <circle cx="4" cy="3" r="0.5" fill="#FFFFFF" opacity="0.035"/>
      <circle cx="2" cy="5" r="0.4" fill="#FFFFFF" opacity="0.03"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.35"/>
  <rect width="1200" height="320" fill="url(#grain)" opacity="0.6"/>

  <circle cx="1060" cy="60" r="140" fill="#C9A227" opacity="0.10"/>
  <circle cx="1120" cy="110" r="85" fill="#F5D56A" opacity="0.08"/>

  <text x="80" y="110" fill="#F5F7FA" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="50" font-weight="700">Dorian Labry</text>
  <rect x="80" y="124" width="160" height="4" rx="2" fill="url(#accent)"/>
  <text x="80" y="154" fill="#E6EEF5" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0.4">Quantitative Developer | Financial Engineer | Trading Systems | Risk Analytics | AI Automation</text>
  <text x="80" y="188" fill="#D7E4EF" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="15">I build production-ready tools that turn market data into actionable signals, robust backtests,</text>
  <text x="80" y="210" fill="#D7E4EF" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="15">and decision dashboards. Remote-friendly. Working in English and French.</text>

  <rect x="80" y="230" width="18" height="6" rx="3" fill="url(#accent)"/>
  <text x="110" y="240" fill="#F5F7FA" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600">Need a quant prototype, a risk audit, or a desk-ready tool? Message me on Upwork.</text>

  <rect y="304" width="1200" height="4" fill="url(#accent)"/>
</svg>