<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dorian Labry hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#0F4C5C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#F5D56A"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)" opacity="0.25"/>

  <circle cx="1020" cy="70" r="140" fill="#C9A227" opacity="0.10"/>
  <circle cx="1100" cy="120" r="90" fill="#F5D56A" opacity="0.08"/>

  <rect x="80" y="260" width="240" height="6" rx="3" fill="url(#accent)"/>

  <text x="80" y="150" fill="#F5F7FA" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700">Dorian Labry</text>
  <text x="80" y="190" fill="#E6EEF5" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600">Quantitative Developer  •  Financial Engineer</text>
  <text x="80" y="224" fill="#C9D6E2" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="18">Trading Systems  •  Risk Analytics  •  AI Automation</text>

  <rect y="332" width="1200" height="4" fill="url(#accent)"/>
</svg>