<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dorian Labry hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#0F4C5C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#F5D56A"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="380" fill="url(#bg)"/>
  <rect width="1200" height="380" fill="url(#grid)" opacity="0.35"/>

  <circle cx="1060" cy="70" r="150" fill="#C9A227" opacity="0.10"/>
  <circle cx="1120" cy="130" r="90" fill="#F5D56A" opacity="0.08"/>
  <circle cx="120" cy="320" r="180" fill="#0B1F3A" opacity="0.35"/>

  <text x="600" y="130" fill="#F5F7FA" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="56" font-weight="700" text-anchor="middle">Dorian Labry</text>
  <rect x="520" y="148" width="160" height="4" rx="2" fill="url(#accent)"/>
  <text x="600" y="178" fill="#E6EEF5" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0.6" text-anchor="middle">Quantitative Developer | Financial Engineer | Trading Systems | Risk Analytics | AI Automation</text>
  <text x="600" y="220" fill="#D7E4EF" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="16" text-anchor="middle">I build production-ready tools that turn market data into actionable signals,</text>
  <text x="600" y="244" fill="#D7E4EF" font-family="Manrope, 'Segoe UI', Arial, sans-serif" font-size="16" text-anchor="middle">robust backtests, and decision dashboards. Remote-friendly. Working in English and French.</text>

  <rect y="350" width="1200" height="4" fill="url(#accent)"/>
</svg>